replicaCount: 1

image:
  repository: replace-me/eks-bedrock-chatbot-rag
  tag: "latest"
  pullPolicy: Always

aws:
  region: us-gov-west-1
  bedrockModelId: replace-with-govcloud-sonnet-4.5-model-id
  bedrockEmbeddingModelId: amazon.titan-embed-text-v2:0
  irsaRoleArn: "arn:aws:iam::ACCOUNT_ID:role/eks-bedrock-chatbot-rag-role"

ai:
  provider: bedrock
  azure:
    endpoint: ""
    deployment: ""
    apiVersion: "2024-10-21"
    apiKeySecret:
      name: "azure-openai"
      key: "api-key"

bedrock:
  knowledgeBaseId: "replace-me"
  knowledgeBaseDataSourceId: "replace-me"

rag:
  maxResults: 5

s3:
  documentBucket: "replace-me"
  documentPrefix: "docs/"

app:
  namespace: chatbot

auth:
  required: false
  allowedEmails: ""
  trustedEmailHeadersCsv: "X-Forwarded-Email,X-Auth-Request-Email,X-Forwarded-User,Remote-Email"

connectors:
  github:
    enabled: false
    serverUrl: https://github.com
    repository: owner/repo
    branch: main
    repoScope: any
    allowedRepositoriesCsv: ""
  jira:
    enabled: false
    serverUrl: https://your-org.atlassian.net
    projectKey: TEAM
  confluence:
    enabled: false
    serverUrl: https://your-org.atlassian.net/wiki
    spaceKey: ENG

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

ingestion:
  schedule: "0 * * * *"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

networkPolicy:
  enabled: true
