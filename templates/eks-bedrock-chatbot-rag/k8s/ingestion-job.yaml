apiVersion: batch/v1
kind: CronJob
metadata:
  name: bedrock-kb-ingestion
  namespace: chatbot
spec:
  # Sync every hour
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: bedrock-chatbot-rag
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          containers:
            - name: ingest
              image: "replace-me/eks-bedrock-chatbot-rag:latest"
              imagePullPolicy: Always
              command: ["python", "workspace/ingest.py"]
              env:
                - name: AWS_REGION
                  valueFrom:
                    configMapKeyRef:
                      name: bedrock-chatbot-rag-config
                      key: aws_region
                - name: BEDROCK_KB_ID
                  valueFrom:
                    configMapKeyRef:
                      name: bedrock-chatbot-rag-config
                      key: bedrock_kb_id
                - name: BEDROCK_KB_DATA_SOURCE_ID
                  valueFrom:
                    configMapKeyRef:
                      name: bedrock-chatbot-rag-config
                      key: bedrock_kb_data_source_id
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
