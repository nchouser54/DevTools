# Connector secrets for the RAG tier — never commit live values.
# Store repo/branch/server targets in the ConfigMap; keep only credentials here.
apiVersion: v1
kind: Secret
metadata:
  name: bedrock-chatbot-rag-connectors
  namespace: chatbot
type: Opaque
stringData:
  GITHUB_PERSONAL_ACCESS_TOKEN: "replace-me"
  JIRA_API_TOKEN: "replace-me"
  JIRA_USER_EMAIL: "you@example.com"
  CONFLUENCE_API_TOKEN: "replace-me"
  CONFLUENCE_USER_EMAIL: "you@example.com"
