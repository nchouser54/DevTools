apiVersion: apps/v1
kind: Deployment
metadata:
  name: bedrock-chatbot-rag
  namespace: chatbot
  labels:
    app: bedrock-chatbot-rag
    version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bedrock-chatbot-rag
  template:
    metadata:
      labels:
        app: bedrock-chatbot-rag
    spec:
      serviceAccountName: bedrock-chatbot-rag
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: chatbot
          image: "replace-me/eks-bedrock-chatbot-rag:latest"
          imagePullPolicy: Always
          env:
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: aws_region
            - name: BEDROCK_MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: bedrock_model_id
            - name: BEDROCK_KB_ID
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: bedrock_kb_id
            - name: BEDROCK_KB_DATA_SOURCE_ID
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: bedrock_kb_data_source_id
            - name: RAG_MAX_RESULTS
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: rag_max_results
            - name: GITHUB_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: github_server_url
            - name: GITHUB_REPOSITORY
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: github_repository
            - name: GITHUB_BRANCH
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: github_branch
            - name: MCP_ENABLE_GITHUB
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: mcp_enable_github
            - name: MCP_ENABLE_JIRA
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: mcp_enable_jira
            - name: MCP_ENABLE_CONFLUENCE
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: mcp_enable_confluence
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bedrock-chatbot-rag-connectors
                  key: GITHUB_PERSONAL_ACCESS_TOKEN
                  optional: true
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bedrock-chatbot-rag-connectors
                  key: JIRA_API_TOKEN
                  optional: true
            - name: JIRA_URL
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: jira_server_url
            - name: JIRA_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: jira_server_url
            - name: JIRA_PROJECT_KEY
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: jira_project_key
            - name: JIRA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bedrock-chatbot-rag-connectors
                  key: JIRA_USER_EMAIL
                  optional: true
            - name: CONFLUENCE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bedrock-chatbot-rag-connectors
                  key: CONFLUENCE_API_TOKEN
                  optional: true
            - name: CONFLUENCE_URL
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: confluence_server_url
            - name: CONFLUENCE_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: confluence_server_url
            - name: CONFLUENCE_SPACE_KEY
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-rag-config
                  key: confluence_space_key
            - name: CONFLUENCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bedrock-chatbot-rag-connectors
                  key: CONFLUENCE_USER_EMAIL
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
