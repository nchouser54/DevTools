replicaCount: 1

image:
  repository: replace-me/eks-bedrock-chatbot-connectors
  tag: "latest"
  pullPolicy: Always

aws:
  region: us-gov-west-1
  bedrockModelId: replace-with-govcloud-sonnet-4.5-model-id
  irsaRoleArn: "arn:aws:iam::ACCOUNT_ID:role/eks-bedrock-chatbot-role"

app:
  namespace: chatbot

connectors:
  allowWrites: false
  github:
    enabled: false
    serverUrl: https://github.com
    repository: owner/repo
    branch: main
  jira:
    enabled: false
    serverUrl: https://your-org.atlassian.net
    projectKey: TEAM
    userEmail: you@example.com
  confluence:
    enabled: false
    serverUrl: https://your-org.atlassian.net/wiki
    spaceKey: ENG
    userEmail: you@example.com

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

networkPolicy:
  enabled: true
