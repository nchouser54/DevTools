# ExternalSecret — syncs connector credentials from AWS Secrets Manager into a Kubernetes Secret.
# Requires External Secrets Operator and a ClusterSecretStore named "aws-secrets-store".
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bedrock-chatbot-connectors
  namespace: chatbot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: ClusterSecretStore
  target:
    name: bedrock-chatbot-connectors
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_PERSONAL_ACCESS_TOKEN
      remoteRef:
        key: bedrock-chatbot/connectors
        property: github_pat
    - secretKey: JIRA_API_TOKEN
      remoteRef:
        key: bedrock-chatbot/connectors
        property: jira_api_token
    - secretKey: JIRA_USER_EMAIL
      remoteRef:
        key: bedrock-chatbot/connectors
        property: jira_user_email
    - secretKey: CONFLUENCE_API_TOKEN
      remoteRef:
        key: bedrock-chatbot/connectors
        property: confluence_api_token
    - secretKey: CONFLUENCE_USER_EMAIL
      remoteRef:
        key: bedrock-chatbot/connectors
        property: confluence_user_email
