apiVersion: v1
kind: Service
metadata:
  name: {{ include "eks-secure-enterprise-api-builder.fullname" . }}
  namespace: {{ .Values.app.namespace }}
  labels:
    {{- include "eks-secure-enterprise-api-builder.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "eks-secure-enterprise-api-builder.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
