{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "eks-secure-enterprise-api-builder.fullname" . }}
  namespace: {{ .Values.app.namespace }}
  labels:
    {{- include "eks-secure-enterprise-api-builder.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "eks-secure-enterprise-api-builder.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.app.port }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
{{- end }}
