apiVersion: v1
kind: ServiceAccount
metadata:
  name: bedrock-chatbot
  namespace: chatbot  # override with K8S_NAMESPACE
  annotations:
    # IRSA: links the Kubernetes ServiceAccount to an AWS IAM role.
    # Replace with the actual role ARN for your account and environment.
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/eks-bedrock-chatbot-role"
