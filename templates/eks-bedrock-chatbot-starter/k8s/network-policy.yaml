apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bedrock-chatbot-network-policy
  namespace: chatbot
spec:
  podSelector:
    matchLabels:
      app: bedrock-chatbot
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from within the same namespace only
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS out (required for Bedrock API calls via VPC endpoint or NAT)
    - ports:
        - protocol: TCP
          port: 443
