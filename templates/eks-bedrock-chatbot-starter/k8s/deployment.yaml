apiVersion: apps/v1
kind: Deployment
metadata:
  name: bedrock-chatbot
  namespace: chatbot
  labels:
    app: bedrock-chatbot
    version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bedrock-chatbot
  template:
    metadata:
      labels:
        app: bedrock-chatbot
    spec:
      serviceAccountName: bedrock-chatbot
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: chatbot
          image: "replace-me/eks-bedrock-chatbot:latest"
          imagePullPolicy: Always
          env:
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-config
                  key: aws_region
            - name: BEDROCK_MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: bedrock-chatbot-config
                  key: bedrock_model_id
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
