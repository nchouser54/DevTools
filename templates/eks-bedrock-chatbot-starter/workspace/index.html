<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .provider-indicator {
            font-size: 12px;
            opacity: 0.9;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            display: inline-block;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-radius: 8px 2px 8px 8px;
        }

        .message.assistant .message-content {
            background: #f0f0f0;
            color: #333;
            border-radius: 2px 8px 8px 8px;
        }

        .message.error .message-content {
            background: #fee;
            color: #c33;
        }

        .input-section {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .controls {
            display: flex;
            gap: 8px;
            font-size: 12px;
        }

        .provider-select {
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            background: white;
        }

        .clear-btn {
            padding: 4px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .message-input {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            font-size: 12px;
            color: #999;
            text-align: center;
            padding: 8px;
            border-top: 1px solid #f0f0f0;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .info-banner {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 4px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Personal Chatbot</h1>
            <div class="provider-indicator" id="providerStatus">Loading...</div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="info-banner">
                Welcome! Your conversation is stored locally in your browser. You can chat with either AWS Bedrock or Azure OpenAI (if configured).
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <div class="controls">
                    <select class="provider-select" id="providerSelect" aria-label="AI provider selection" title="AI provider selection">
                        <option value="">Auto (Bedrock preferred)</option>
                        <option value="bedrock">AWS Bedrock</option>
                        <option value="azure">Azure OpenAI</option>
                    </select>
                    <button class="clear-btn" onclick="clearHistory()">Clear History</button>
                </div>
                <div class="message-input">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Type your message..."
                        onkeypress="handleKeyPress(event)"
                    >
                    <button onclick="sendMessage()" id="sendBtn">Send</button>
                </div>
            </div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        const API_URL = '/chat';
        const HISTORY_KEY = 'chatbot_history';
        let conversationHistory = [];
        let isLoading = false;

        // Load conversation history from localStorage on startup
        function loadHistory() {
            const stored = localStorage.getItem(HISTORY_KEY);
            if (stored) {
                try {
                    conversationHistory = JSON.parse(stored);
                    renderHistory();
                } catch (e) {
                    console.warn('Failed to load conversation history:', e);
                }
            }
        }

        // Save conversation history to localStorage
        function saveHistory() {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(conversationHistory));
        }

        // Render all messages
        function renderHistory() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = '<div class="info-banner">Welcome! Your conversation is stored locally in your browser. You can chat with either AWS Bedrock or Azure OpenAI (if configured).</div>';
            
            conversationHistory.forEach(msg => {
                addMessageToDOM(msg.role, msg.content);
            });

            // Auto-scroll to bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Add message to DOM
        function addMessageToDOM(role, content, isError = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}${isError ? ' error' : ''}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Send message to chatbot
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || isLoading) return;

            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            input.disabled = true;

            // Add user message to history and DOM
            conversationHistory.push({ role: 'user', content: message });
            addMessageToDOM('user', message);
            input.value = '';

            try {
                const provider = document.getElementById('providerSelect').value || undefined;
                const body = {
                    message,
                    history: conversationHistory.slice(0, -1), // All except the user msg we just added
                    ...(provider && { provider })
                };

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }

                // Update full history from server response
                conversationHistory = data.history;
                const reply = data.reply;
                addMessageToDOM('assistant', reply);
                updateStatus(`Replied by ${data.model} (${data.provider})`);

            } catch (error) {
                console.error('Error:', error);
                addMessageToDOM('error', `Error: ${error.message}`, true);
                // Remove the user message from history if the request failed
                conversationHistory.pop();
                updateStatus('Failed to get response');
            } finally {
                saveHistory();
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey && !isLoading) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Clear conversation history
        function clearHistory() {
            if (confirm('Clear all conversation history?')) {
                conversationHistory = [];
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
                updateStatus('History cleared');
            }
        }

        // Update status indicator
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        // Check API status on load
        async function checkAPIStatus() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                const providerStatus = document.getElementById('providerStatus');
                providerStatus.textContent = `${data.provider_mode.toUpperCase()} • ${data.model}`;
                updateStatus('Connected');
            } catch (error) {
                console.error('Failed to check API status:', error);
                updateStatus('API connection failed');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            checkAPIStatus();
            document.getElementById('messageInput').focus();
        });
    </script>
</body>
</html>
